version: '3.8'

services:
  # 1. 공통 데이터베이스 (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: benchmark_db
    environment:
      # .env 파일과 일치하도록 수정했습니다.
      POSTGRES_USER: benchmark_user
      POSTGRES_PASSWORD: benchmark_password
      POSTGRES_DB: olist_db
    ports:
      - "5432:5432"
    volumes:
      - ./init-db:/docker-entrypoint-initdb.d # 초기 데이터 적재
      - ./data:/data
      - pgdata:/var/lib/postgresql/data       # 데이터 영속성 (재시작 시 속도 향상)

  # 2. REST API 서버 (Gin)
  rest-api:
    build: 
      context: .
      dockerfile: Dockerfile.rest
    container_name: benchmark_rest
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      - DB_HOST=db  # 컨테이너 간 통신을 위해 'db' 서비스명 사용
      - DB_PORT=5432
      - DB_USER=benchmark_user
      - DB_PASS=benchmark_password
      - DB_NAME=olist_db
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M

  # 3. GraphQL 서버 (gqlgen)
  graphql-api:
    build: 
      context: .
      dockerfile: Dockerfile.graphql
    container_name: benchmark_graphql
    ports:
      - "8081:8081"
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=benchmark_user
      - DB_PASS=benchmark_password
      - DB_NAME=olist_db
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M

  # 4. gRPC 서버
  grpc-api:
    build: 
      context: .
      dockerfile: Dockerfile.grpc
    container_name: benchmark_grpc
    ports:
      - "50051:50051"
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=benchmark_user
      - DB_PASS=benchmark_password
      - DB_NAME=olist_db
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M

  # 5. Envoy Proxy (gRPC-Web 통신용)
  envoy:
    image: envoyproxy/envoy:v1.27.0
    container_name: benchmark_envoy
    volumes:
      - ./envoy.yaml:/etc/envoy/envoy.yaml
    ports:
      - "8082:8080" # k6가 접근할 포트
    depends_on:
      - grpc-api
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M

volumes:
  pgdata: # 데이터 보존용 볼륨 정의