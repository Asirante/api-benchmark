services:
  # 1. 공통 데이터베이스 (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: benchmark_db
    environment:
      POSTGRES_USER: benchmark_user
      POSTGRES_PASSWORD: benchmark_password
      POSTGRES_DB: olist_db
    ports:
      - "5432:5432"
    volumes:
      - ./init-db:/docker-entrypoint-initdb.d
      - ./data:/data
      - pgdata:/var/lib/postgresql/data

  # 2. REST API 서버 (Gin)
  rest-api:
    build: 
      context: .
      dockerfile: Dockerfile.rest
    container_name: benchmark_rest
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=benchmark_user
      - DB_PASS=benchmark_password
      - DB_NAME=olist_db
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M

  # 3. GraphQL 서버 (gqlgen)
  graphql-api:
    build: 
      context: .
      dockerfile: Dockerfile.graphql
    container_name: benchmark_graphql
    ports:
      - "8081:8081"
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=benchmark_user
      - DB_PASS=benchmark_password
      - DB_NAME=olist_db
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M

  # 4. gRPC 서버
  grpc-api:
    build: 
      context: .
      dockerfile: Dockerfile.grpc
    container_name: benchmark_grpc
    ports:
      - "50051:50051"
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=benchmark_user
      - DB_PASS=benchmark_password
      - DB_NAME=olist_db
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M

  # 5. Envoy Proxy (gRPC-Web 통신용)
  envoy:
    image: envoyproxy/envoy:v1.27.0
    container_name: benchmark_envoy
    volumes:
      - ./envoy.yaml:/etc/envoy/envoy.yaml
    ports:
      - "8082:8082" 
      - "9901:9901" # 관리자 및 모니터링 포트
    depends_on:
      - grpc-api
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M

  # 6. 통계 저장소 (InfluxDB - k6 데이터 적재용)
  influxdb:
    image: influxdb:1.8
    container_name: benchmark_influxdb
    ports:
      - "8086:8086"
    environment:
      - INFLUXDB_DB=k6

# 7. 시각화 대시보드 (Grafana)
  grafana:
    image: grafana/grafana:latest
    container_name: benchmark_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_BASIC_ENABLED=false
    depends_on:
      - influxdb
    # 🔥 이 두 줄을 추가하세요! (그라파나 설정 영구 저장)
    volumes:
      - grafana_data:/var/lib/grafana

# 맨 아래쪽 volumes 선언부에도 추가!
volumes:
  pgdata:
  grafana_data: # 🔥 이것도 추가!